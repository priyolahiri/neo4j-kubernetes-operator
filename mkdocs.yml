site_name: Neo4j Kubernetes Operator
site_description: A Kubernetes operator for Neo4j Enterprise — declarative clusters, databases, users, roles, backups, and plugins.
site_url: https://priyolahiri.github.io/neo4j-kubernetes-operator/
site_author: Priyo Lahiri

repo_url: https://github.com/priyolahiri/neo4j-kubernetes-operator
repo_name: priyolahiri/neo4j-kubernetes-operator
edit_uri: edit/main/docs/

# docs/README.md duplicates docs/index.md for GitHub-flavoured directory
# rendering; the dated planning docs in docs/plans/ are internal-only;
# requirements.txt is consumed by the docs workflow, not part of the site.
# Anchor with leading slash so nested READMEs (e.g. gitops/README.md) aren't matched.
exclude_docs: |
  /README.md
  /requirements.txt
  /plans/
  # The granular regression-rule dumps + knowledge index stay in-repo reference
  # for agents/maintainers (they read these from the tree, not the site). The
  # foundational invariants ARE published (knowledge/invariants.md, in nav).
  /knowledge/README.md
  /knowledge/operations.md
  /knowledge/backup-restore.md

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.share
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/neo4j.css

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.smartsymbols

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/priyolahiri/neo4j-kubernetes-operator
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/neo4j/neo4j-enterprise

