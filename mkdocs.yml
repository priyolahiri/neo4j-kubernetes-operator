site_name: Neo4j Kubernetes Operator
site_description: A Kubernetes operator for Neo4j Enterprise — declarative clusters, databases, users, roles, backups, and plugins.
site_url: https://neo4j-partners.github.io/neo4j-kubernetes-operator/
site_author: Neo4j Partners

repo_url: https://github.com/neo4j-partners/neo4j-kubernetes-operator
repo_name: neo4j-partners/neo4j-kubernetes-operator
edit_uri: edit/main/docs/

# docs/README.md duplicates docs/index.md for GitHub-flavoured directory
# rendering; the dated planning docs in docs/plans/ are internal-only;
# requirements.txt is consumed by the docs workflow, not part of the site.
# Anchor with leading slash so nested READMEs (e.g. gitops/README.md) aren't matched.
exclude_docs: |
  /README.md
  /requirements.txt
  /plans/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.share
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.smartsymbols

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/neo4j-partners/neo4j-kubernetes-operator
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/neo4j/neo4j-enterprise

nav:
  - Home: index.md

  - Getting Started:
      - Quickstart: user_guide/getting_started.md
      - Installation: user_guide/installation.md
      - Deployment: user_guide/deployment.md
      - Operator Modes: user_guide/operator-modes.md
      - Migration Guide: user_guide/migration_guide.md

  - User Guide:
      - Configuration: user_guide/configuration.md
      - TLS Certificates: user_guide/tls_certificates.md
      - TLS (Detailed): user_guide/configuration/tls.md
      - External Access: user_guide/external_access.md
      - Clustering: user_guide/clustering.md
      - Topology Placement: user_guide/topology_placement.md
      - Property Sharding: user_guide/property_sharding.md
      - Aura Fleet Management: user_guide/aura_fleet_management.md
      - User & Role Management: user_guide/user_role_management.md
      - Performance: user_guide/performance.md
      - Security: user_guide/security.md

  - Guides:
      - Configuration Best Practices: user_guide/guides/configuration_best_practices.md
      - Backup & Restore: user_guide/guides/backup_restore.md
      - Backup Disk Management: user_guide/guides/backup-disk-management.md
