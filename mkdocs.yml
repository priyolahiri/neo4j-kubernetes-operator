      - Storage Expansion: user_guide/guides/storage_expansion.md
      - Upgrades: user_guide/guides/upgrades.md
      - Resource Sizing: user_guide/guides/resource_sizing.md
      - Performance: user_guide/guides/performance.md
      - Fault Tolerance: user_guide/guides/fault_tolerance.md
      - Security: user_guide/guides/security.md
      - Seed URI: user_guide/guides/seed-uri.md
      - Monitoring: user_guide/guides/monitoring.md
      - Prometheus & Grafana: user_guide/guides/prometheus-grafana-setup.md
      - Kubernetes Events: user_guide/guides/kubernetes-events.md
      - MCP Client Setup: user_guide/guides/mcp_client_setup.md
      - Demo: user_guide/guides/demo.md
      - Troubleshooting: user_guide/guides/troubleshooting.md

  - Troubleshooting:
      - Backup & Restore: user_guide/troubleshooting/backup_restore.md
