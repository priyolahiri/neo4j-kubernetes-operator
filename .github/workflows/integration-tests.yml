name: Extended Integration Tests

on:
  workflow_dispatch:
    inputs:
      neo4j-version:
        description: 'Neo4j image tag to test against. Defaults to the pinned
          CalVer track — the strict ceiling new users run. Pass 5.26-enterprise
          to verify the LTS floor on the full suite.'
        required: false
        # Pinned CalVer default. Keep in sync with the neo4j-version matrix list
        # in integration.yml (the core lane) — bump both in the same PR.
        default: '2026.04-enterprise'
        type: string
      timeout-minutes:
        description: 'Ginkgo suite timeout in minutes. CalVer images are ~2x
          slower per spec than 5.26, so the full suite needs ~150 of headroom.'
        required: false
        default: '150'
        type: string
  # Nightly run on main against the pinned CalVer track. This is what keeps main
  # continuously known-good on the version users actually deploy, so a regression
  # is caught the day it merges (cheap, attributable) rather than at release time.
  # It also means tagging a release ships a commit whose CalVer health is already
  # established — the tag is too late to be the gate (it IS the release trigger).
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  # Opt-in per-PR run: apply the `run-extended` label to a PR to run the EXTENDED
  # specs (backup/restore/sharding/multi-node) against it. PRs do NOT auto-run
  # Extended — by design, the default PR signal is the fast core lane (Integration
  # Tests, 5.26 ∥ CalVer), keeping the dev cycle short. On the PR event we run
  # `extended`-only (the core lane already covers core on that PR — see the
  # label-filter in the run step), so there's no redundant core re-run. Labels are
  # maintainer-only, which also keeps untrusted fork PRs from triggering it.
  pull_request:
    types: [labeled]

# Cancel a PR's in-flight run when a new commit is pushed to the same PR — the
# extended suite is multi-hour on CalVer, so leaving the superseded run going
# wastes a runner for nothing. Keyed on the PR number for pull_request events;
# manual workflow_dispatch runs (no PR number) fall back to the unique run_id so
# they each get their own group and never cancel one another's verification runs.
concurrency:
  group: extended-integration-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  KIND_VERSION: 'v0.27.0'

jobs:
  extended-integration-tests:
    name: Extended Integration Tests
    # Run on schedule/dispatch always; on a PR only when the `run-extended` label
    # is the one just applied (other labels added to the PR are ignored).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-extended'
    runs-on: ubuntu-latest
    # Fixed safety backstop, well above the Ginkgo --timeout below (the real gate,
    # driven by the timeout-minutes input; default 150 for the CalVer full suite).
    # GitHub expressions can't do arithmetic, so this is a generous constant rather
    # than input+buffer: Ginkgo self-terminates at its own timeout first and exits
    # gracefully (writes the report + uploads artifacts); this only kills a wedged
    # runner. Keep it comfortably above any timeout-minutes you'd dispatch.
    timeout-minutes: 240
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Go environment
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup Kubernetes environment
      uses: ./.github/actions/setup-k8s
      with:
        kind-version: ${{ env.KIND_VERSION }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Build the operator image with a GitHub Actions layer cache so unchanged
    # layers (base image, go mod download) are reused; only changed Go code
    # rebuilds. load:true puts it in the daemon for the kind load below.
    - name: Build operator image (gha layer cache)
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        tags: neo4j-operator:integration-test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=integration-test
          BUILD_DATE=ci
          VCS_REF=${{ github.sha }}

    # Cache the Neo4j Enterprise image as a tarball, keyed on the tag. On a hit we
    # skip the Docker Hub pull entirely (faster + dodges anonymous rate limits)
    # and import the tarball straight into kind's containerd.
    - name: Cache Neo4j image tarball
      uses: actions/cache@v5
      with:
        path: /tmp/neo4j-image.tar
        key: neo4j-image-${{ github.event.inputs.neo4j-version || '2026.04-enterprise' }}

    - name: Create cluster and deploy operator
      run: |
        NEO4J_VERSION="${{ github.event.inputs.neo4j-version || '2026.04-enterprise' }}"

        echo "▶ Creating test cluster..."
        make test-cluster

        echo "▶ Installing CRDs..."
        make manifests install

        echo "▶ Loading pre-built operator image into Kind..."
        kind load docker-image neo4j-operator:integration-test --name neo4j-operator-test

        echo "▶ Deploying operator to neo4j-operator-system..."
        make kustomize
        mkdir -p config/overlays/ci-temp
        cat > config/overlays/ci-temp/kustomization.yaml <<EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        namespace: neo4j-operator-system
        resources:
        - ../../default
        images:
        - name: ghcr.io/priyolahiri/neo4j-kubernetes-operator
          newName: neo4j-operator
          newTag: integration-test
        # Relax property-sharding's 4Gi/1-core floor so the sharded CI smoke
        # test (gated to Neo4j 2025.12+) fits on a GitHub-hosted runner. This
        # mirrors config/overlays/integration-test; without it the operator's
        # validator rejects the CI sizing and the smoke test times out. CI-only.
        patches:
        - patch: |-
            - op: add
              path: /spec/template/spec/containers/0/env/-
              value:
                name: NEO4J_SHARDING_RELAX_MEMORY_MIN
                value: "true"
          target:
            kind: Deployment
            name: controller-manager
        EOF
        ./bin/kustomize build config/overlays/ci-temp | kubectl apply -f -

        echo "▶ Waiting for operator to be ready..."
        kubectl wait --for=condition=available --timeout=120s \
          deployment/neo4j-operator-controller-manager -n neo4j-operator-system
        kubectl describe deployment neo4j-operator-controller-manager \
          -n neo4j-operator-system | grep -A2 "Image:" || true

        echo "▶ Loading Neo4j image: neo4j:${NEO4J_VERSION}"
        # Use the cached tarball when present (cache hit); otherwise pull once and
        # save it for the cache to persist.
        #
        # Import goes straight into kind's containerd via `ctr` WITHOUT
        # --all-platforms: both `kind load` paths pipe to `ctr import
        # --all-platforms`, which chases every digest in the multi-arch OCI index
        # (Docker 27+ stores the full index even for a --platform pull) and fails
        # on blobs for platforms not downloaded locally. Bypassing kind's loader
        # imports only the linux/amd64 manifest.
        if [ ! -f /tmp/neo4j-image.tar ]; then
          echo "cache miss — pulling neo4j:${NEO4J_VERSION}"
          if ! docker pull --platform linux/amd64 neo4j:${NEO4J_VERSION}; then
            echo "❌ Failed to pull neo4j:${NEO4J_VERSION} — image is required for tests"
            exit 1
          fi
          docker save neo4j:${NEO4J_VERSION} -o /tmp/neo4j-image.tar
        else
          echo "cache hit — using /tmp/neo4j-image.tar"
        fi
        docker exec --privileged -i neo4j-operator-test-control-plane \
          ctr --namespace=k8s.io images import --snapshotter=overlayfs - < /tmp/neo4j-image.tar
        echo "✅ neo4j:${NEO4J_VERSION} loaded into Kind"

    - name: Run extended integration tests
      run: |
        export FORCE_COLOR=1
        echo "📊 Neo4j version: ${{ github.event.inputs.neo4j-version || '2026.04-enterprise' }}"
        echo "🔗 Running full integration test suite..."

        # Use the project-pinned ginkgo binary (make ginkgo downloads to ./bin/ginkgo)
        make ginkgo

        set -o pipefail
        # Event-aware scope: schedule/dispatch run the FULL suite (core+extended);
        # a label-gated PR run does EXTENDED-only, because the core lane already
        # covers core on that PR and re-running it here would be a redundant
        # CalVer-core run.
        LABEL_FILTER="core || extended"
        [ "${{ github.event_name }}" = "pull_request" ] && LABEL_FILTER="extended"
        echo "📊 label-filter: ${LABEL_FILTER}"
        # --procs=1: the suite shares ONE Kind cluster + operator — must run
        # serially (Ginkgo's default, explicit here to guard against an accidental -p).
        # --json-report feeds the per-spec failure/timing summary below.
        ./bin/ginkgo run -v --timeout="${GINKGO_TIMEOUT_MIN}m" --procs=1 \
          --label-filter="${LABEL_FILTER}" \
          --json-report=ginkgo-report.json \
          ./test/integration/... | tee integration-test-output.log
      env:
        KUBECONFIG: /home/runner/.kube/config
        NEO4J_VERSION: ${{ github.event.inputs.neo4j-version || '2026.04-enterprise' }}
        GINKGO_TIMEOUT_MIN: ${{ github.event.inputs.timeout-minutes || '150' }}
        FORCE_COLOR: 1

    - name: Ginkgo report summary (failed specs + timings)
      if: always()
      run: ./scripts/ginkgo-report-summary.sh ginkgo-report.json 30 || true

    - name: Collect cluster state
      if: always()
      run: |
        echo "=== Cluster Nodes ==="
        kubectl get nodes -o wide || true

        echo "=== All Pods ==="
        kubectl get pods --all-namespaces || true

        echo "=== Neo4j Resources ==="
        kubectl get neo4jenterpriseclusters,neo4jenterprisestandalones,neo4jdatabases,neo4jplugins --all-namespaces || true

        echo "=== Recent Events ==="
        kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -50 || true

    - name: Collect cluster logs
      uses: ./.github/actions/collect-logs
      if: always()
      with:
        artifact-name: integration-test-logs

    - name: Archive test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: integration-test-results
        path: |
          coverage/
          *.out
          integration-test-output.log
          ginkgo-report.json
        if-no-files-found: warn

    - name: Cleanup test cluster
      if: always()
      run: make test-cluster-delete || true

  extended-integration-test-summary:
    name: Extended Integration Test Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [extended-integration-tests]
    # Mirror the main job's gate so we don't post a summary when Extended was
    # skipped (a non-`run-extended` label added to a PR).
    if: >-
      always() &&
      (github.event_name != 'pull_request' || github.event.label.name == 'run-extended')

    steps:
    - name: Extended Integration Test Summary
      run: |
        echo "## Extended Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.extended-integration-tests.result }}" == "success" ]; then
          echo "✅ **Extended Integration Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All extended integration tests completed successfully with custom Neo4j version." >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.extended-integration-tests.result }}" == "failure" ]; then
          echo "❌ **Extended Integration Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Extended integration tests encountered failures. Check the logs and artifacts for details." >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.extended-integration-tests.result }}" == "cancelled" ]; then
          echo "⏹️ **Extended Integration Tests**: CANCELLED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Extended integration tests were cancelled before completion." >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Extended Integration Tests**: UNKNOWN STATUS" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Neo4j Version**: ${{ github.event.inputs.neo4j-version || '2026.04-enterprise' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Timeout**: ${{ github.event.inputs.timeout-minutes || '150' }} minutes" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Suite**: Full integration suite with custom Neo4j version" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
        echo "- Extended integration test logs and cluster state dumps are available as workflow artifacts" >> $GITHUB_STEP_SUMMARY
