name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: neo4j-partners/neo4j-kubernetes-operator
  CHART_REGISTRY: ghcr.io/neo4j-partners/charts
  GO_VERSION: '1.26'

jobs:
  # Compute the release tag once and share it across all dependent jobs.
  # This eliminates the duplicated tag-parsing logic that previously appeared
  # three times in the file.
  determine-tag:
    name: Determine Release Tag
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      clean_tag: ${{ steps.tag.outputs.clean_tag }}
    steps:
    - name: Compute tag
      id: tag
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
        fi
        CLEAN_TAG=${TAG_NAME#v}
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Go environment
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run unit tests
      run: make test-unit

    - name: Validate build
      run: make build

    # Belt-and-braces: tags are normally cut from a green main, but a tag on
    # any other commit would bypass the per-PR drift gate entirely — and a
    # release with stale generated artifacts ships a chart/bundle that doesn't
    # match the code.
    - name: Verify generated artifacts in sync
      run: make check-drift

    - name: Generate manifests
      run: make manifests

    # Upload generated CRDs as an artifact so create-release can reuse them
    # exactly, guaranteeing the released manifests are identical to what was
    # validated here without re-running controller-gen a second time.
    - name: Upload generated manifests
      uses: actions/upload-artifact@v7
      with:
        name: generated-manifests
        path: config/crd/bases/
        retention-days: 1

  # The full install/upgrade/uninstall matrix on Kind (scripts/
  # install-confidence.sh). Blocking by design: a release cannot be tagged
  # with a broken helm install, CRD-refresh upgrade, or uninstall path.
  # Runs in parallel with validate-release; adds ~10-15 min to the release
  # only on the critical path if it's the slower of the two.
  install-confidence:
    name: Install Confidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Go environment
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install kind
      # v0.27.0 to match KIND_VERSION in ci.yml/integration*.yml — its default
        # node image is K8s >=1.32, which the chart's kubeVersion constraint
        # requires. kind v0.24's default node (K8s 1.31) fails the very helm
        # install this gate exists to certify (v1.12.0 first-tag failure).
        run: go install sigs.k8s.io/kind@v0.27.0

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: 3.16.0

    - name: Run install-confidence matrix
      run: make install-confidence

  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    needs: [validate-release, install-confidence, determine-tag]
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless OIDC signing
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        # Pin to match pages-helm.yml + .tool-versions. Without an
        # explicit version the action installs whatever Helm 3.x is
        # current at job time, so the release workflow would silently
        # drift from the pages workflow that pins v3.16.0.
        version: 3.16.0

    - name: Get build date
      id: build-date
      run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

    - name: Extract operator metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    - name: Build and push operator image
      id: build-operator
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        build-args: |
          VERSION=${{ needs.determine-tag.outputs.clean_tag }}
          BUILD_DATE=${{ steps.build-date.outputs.date }}
          VCS_REF=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Keyless signing using Sigstore/Cosign. No long-lived secrets required;
    # the OIDC token from the GitHub Actions workflow is used as proof of identity.
    # Signatures are published to the public Rekor transparency log.
    - name: Sign operator image
      run: |
        cosign sign --yes \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-operator.outputs.digest }}

    - name: Log in to GHCR for Helm
      run: |
        helm registry login ghcr.io \
          --username "${{ github.actor }}" \
          --password "${{ secrets.GITHUB_TOKEN }}"

    - name: Update Helm chart version
      run: |
        CLEAN_TAG="${{ needs.determine-tag.outputs.clean_tag }}"
        sed -i "s/^version: .*/version: ${CLEAN_TAG}/" charts/neo4j-operator/Chart.yaml
        sed -i "s/^appVersion: .*/appVersion: \"${CLEAN_TAG}\"/" charts/neo4j-operator/Chart.yaml
        echo "Updated Chart.yaml:"
        grep -E "^(version|appVersion):" charts/neo4j-operator/Chart.yaml

    - name: Lint Helm chart
      run: helm lint charts/neo4j-operator

    - name: Package and push Helm chart (OCI)
      run: |
        helm package charts/neo4j-operator \
          --version "${{ needs.determine-tag.outputs.clean_tag }}" \
          --app-version "${{ needs.determine-tag.outputs.clean_tag }}"
        helm push "neo4j-operator-${{ needs.determine-tag.outputs.clean_tag }}.tgz" \
          "oci://${{ env.CHART_REGISTRY }}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, determine-tag]

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Go environment
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    # Reuse the CRDs generated and validated in the validate-release job.
    # This ensures the released manifests are byte-for-byte identical to what
    # was validated, without running controller-gen a second time.
    - name: Download generated manifests
      uses: actions/download-artifact@v8
      with:
        name: generated-manifests
        path: config/crd/bases/

    - name: Generate release artifacts
      env:
        TAG_NAME: ${{ needs.determine-tag.outputs.tag_name }}
        CLEAN_TAG: ${{ needs.determine-tag.outputs.clean_tag }}
      run: |
        # Generate OperatorHub bundle/CSV using pre-generated CRDs (SKIP_MANIFESTS=true).
        # Use `bundle-release` (not `bundle`) so the CSV's createdAt: annotation
        # gets stamped with the real UTC timestamp before publishing. Plain
        # `make bundle` writes a stable placeholder so dev/CI PRs don't conflict
        # on the timestamp — that placeholder must NOT reach OperatorHub.
        make bundle-release \
          SKIP_MANIFESTS=true \
          VERSION="${CLEAN_TAG}" \
          CHANNELS=alpha \
          DEFAULT_CHANNEL=alpha \
          IMG="${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}"

        # Safety net: fail loudly if the placeholder timestamp survived. The only
        # way this fires is a future refactor of bundle-release that drops the
        # restamp step — better to fail the release than ship 2020 to users.
        if grep -q 'createdAt: "2020-01-01T00:00:00Z"' bundle/manifests/neo4j-kubernetes-operator.clusterserviceversion.yaml; then
          echo "::error::CSV createdAt: is still the dev placeholder. Refusing to publish bundle to OperatorHub." >&2
          exit 1
        fi

        mkdir -p release-artifacts
        mkdir -p bundle-artifact

        # CRD-only manifest (concatenated from all CRD bases)
        cat config/crd/bases/*.yaml > release-artifacts/neo4j-kubernetes-operator.yaml

        # OperatorHub bundle for inter-job transfer to submit-operatorhub.
        # Written outside release-artifacts/ so it is NOT uploaded as a
        # public release asset — it is a workflow internal, not a user artifact.
        tar -czf "bundle-artifact/operatorhub-bundle-${CLEAN_TAG}.tar.gz" bundle/

        # Complete operator manifest (CRDs + RBAC + Deployment) with OPERATOR_VERSION
        # stamped to the release tag via a kustomize strategic merge patch overlay.
        # This avoids the fragile regex/sed approach that breaks on formatting changes.
        make kustomize
        mkdir -p config/overlays/release-temp
        cat > config/overlays/release-temp/version-patch.yaml << EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: controller-manager
        spec:
          template:
            spec:
              containers:
              - name: manager
                env:
                - name: OPERATOR_VERSION
                  value: "${TAG_NAME}"
        EOF
        cat > config/overlays/release-temp/kustomization.yaml << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
        - ../../default
        # Pin the released image EXPLICITLY. Previously the pin worked only
        # as a side effect of \`make bundle-release\` mutating
        # config/manager/kustomization.yaml earlier in this job — one step
        # reorder away from shipping :latest.
        images:
        - name: ghcr.io/neo4j-partners/neo4j-kubernetes-operator
          newTag: "${TAG_NAME}"
        patches:
        - path: version-patch.yaml
          target:
            kind: Deployment
            labelSelector: "control-plane=controller-manager"
        EOF
        ./bin/kustomize build config/overlays/release-temp \
          > release-artifacts/neo4j-kubernetes-operator-complete.yaml
        rm -rf config/overlays/release-temp
        # Assert the pin actually landed — fail the release rather than ship
        # an artifact pointing at :latest.
        grep -q "image: ghcr.io/neo4j-partners/neo4j-kubernetes-operator:${TAG_NAME}" \
          release-artifacts/neo4j-kubernetes-operator-complete.yaml || {
          echo "ERROR: complete.yaml is not pinned to ${TAG_NAME}" >&2; exit 1; }

    # Hand the OperatorHub bundle off to the submit-operatorhub job via the
    # GHA artifact store. The two jobs run on separate runners with no shared
    # filesystem; this is the idiomatic transfer mechanism. Short retention
    # because nothing outside this workflow consumes it.
    - name: Upload OperatorHub bundle for submission job
      uses: actions/upload-artifact@v7
      with:
        name: operatorhub-bundle
        path: bundle-artifact/operatorhub-bundle-*.tar.gz
        retention-days: 1
        if-no-files-found: error

    - name: Generate release notes
      id: release-notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ needs.determine-tag.outputs.tag_name }}
        CLEAN_TAG: ${{ needs.determine-tag.outputs.clean_tag }}
      run: |
        echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT

        sed -e "s|__TAG__|${TAG_NAME}|g" -e "s|__VERSION__|${CLEAN_TAG}|g" \
          .github/release-notes-template.md > release-notes.md

        curl -sSf \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
          -d "{\"tag_name\":\"${TAG_NAME}\"}" > auto-notes.json

        python3 - <<'PY'
        import json

        with open("auto-notes.json", "r") as handle:
            body = json.load(handle).get("body", "").strip()

        if body:
            with open("release-notes.md", "a") as handle:
                handle.write("\n\n## Changelog\n\n")
                handle.write(body)
        PY

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.release-notes.outputs.TAG_NAME }}
        name: Neo4j Kubernetes Operator ${{ steps.release-notes.outputs.TAG_NAME }}
        body_path: release-notes.md
        files: |
          release-artifacts/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  submit-operatorhub:
    name: Submit to OperatorHub
    runs-on: ubuntu-latest
    needs: [create-release, determine-tag]

    permissions:
      contents: read

    steps:
    - name: Download OperatorHub bundle from create-release job
      uses: actions/download-artifact@v8
      with:
        name: operatorhub-bundle
        path: /tmp

    - name: Clone community-operators fork
      env:
        GH_TOKEN: ${{ secrets.OPERATORHUB_PAT }}
      run: |
        git clone "https://x-access-token:${GH_TOKEN}@github.com/neo4j-partners/community-operators.git" /tmp/community-operators

    - name: Sync fork's main with upstream
      # Must run BEFORE the bundle is extracted into the working tree.
      # Otherwise, when upstream's main has tracked files (e.g. ci.yaml)
      # whose paths we are about to add as untracked files, the merge
      # aborts with "untracked working tree files would be overwritten".
      env:
        GH_TOKEN: ${{ secrets.OPERATORHUB_PAT }}
      run: |
        cd /tmp/community-operators
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git remote add upstream https://github.com/k8s-operatorhub/community-operators.git
        git fetch upstream main
        git checkout main
        git merge upstream/main --no-edit
        git push origin main

    - name: Extract bundle into versioned directory
      env:
        CLEAN_TAG: ${{ needs.determine-tag.outputs.clean_tag }}
      run: |
        OPERATOR_DIR="/tmp/community-operators/operators/neo4j-kubernetes-operator"
        mkdir -p "${OPERATOR_DIR}/${CLEAN_TAG}"
        tar -xzf "/tmp/operatorhub-bundle-${CLEAN_TAG}.tar.gz" \
          -C "${OPERATOR_DIR}/${CLEAN_TAG}" --strip-components=1

        # Ensure ci.yaml exists (first submission creates it)
        if [ ! -f "${OPERATOR_DIR}/ci.yaml" ]; then
          echo "updateGraph: semver-mode" > "${OPERATOR_DIR}/ci.yaml"
        fi

    - name: Create submission branch and PR
      env:
        GH_TOKEN: ${{ secrets.OPERATORHUB_PAT }}
        CLEAN_TAG: ${{ needs.determine-tag.outputs.clean_tag }}
      run: |
        cd /tmp/community-operators

        BRANCH="neo4j-kubernetes-operator-${CLEAN_TAG}"
        git checkout -b "${BRANCH}"
        git add "operators/neo4j-kubernetes-operator/"
        git commit --signoff -m "operator neo4j-kubernetes-operator (${CLEAN_TAG})"
        git push origin "${BRANCH}"

        cat > /tmp/pr-body.md <<EOF
        ### New operator version

        Operator: neo4j-kubernetes-operator
        Version: ${CLEAN_TAG}

        Automated submission from [release v${CLEAN_TAG}](https://github.com/neo4j-partners/neo4j-kubernetes-operator/releases/tag/v${CLEAN_TAG}).
        EOF
        sed -i 's/^        //' /tmp/pr-body.md

        gh pr create \
          --repo k8s-operatorhub/community-operators \
          --head "neo4j-partners:${BRANCH}" \
          --title "operator neo4j-kubernetes-operator (${CLEAN_TAG})" \
          --body-file /tmp/pr-body.md
