name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: priyolahiri/neo4j-kubernetes-operator
  MCP_IMAGE_NAME: priyolahiri/neo4j-kubernetes-operator-mcp
  MCP_REPO: https://github.com/neo4j/mcp.git
  CHART_REGISTRY: ghcr.io/priyolahiri/charts
  GO_VERSION: '1.22'

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go environment
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run unit tests
      run: make test-unit

    - name: Validate build
      run: make build

    - name: Generate manifests
      run: make manifests

  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
      packages: write
    outputs:
      mcp_tag: ${{ steps.mcp-tag.outputs.mcp_tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Determine release tag
      id: release-tag
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
        fi
        CLEAN_TAG=${TAG_NAME#v}
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

    - name: Determine MCP release tag
      id: mcp-tag
      run: |
        MCP_TAG=$(git ls-remote --tags --refs "${{ env.MCP_REPO }}" \
          | awk '{print $2}' \
          | sed 's#refs/tags/##' \
          | sort -V \
          | tail -n 1)
        if [ -z "$MCP_TAG" ]; then
          echo "Failed to resolve MCP release tag" >&2
          exit 1
        fi
        echo "mcp_tag=${MCP_TAG}" >> $GITHUB_OUTPUT

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    - name: Extract MCP metadata
      id: meta-mcp
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.MCP_IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.mcp-tag.outputs.mcp_tag }}

    - name: Build and push container image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push MCP image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: images/neo4j-mcp/Dockerfile
        push: true
        tags: ${{ steps.meta-mcp.outputs.tags }}
        labels: ${{ steps.meta-mcp.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        build-args: |
          MCP_REPO=${{ env.MCP_REPO }}
          MCP_REF=${{ steps.mcp-tag.outputs.mcp_tag }}
          MCP_VERSION=${{ steps.mcp-tag.outputs.mcp_tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Log in to GHCR for Helm
      if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
      run: |
        helm registry login ghcr.io \
          --username "${{ github.actor }}" \
          --password "${{ secrets.GITHUB_TOKEN }}"

    - name: Package and push Helm chart (OCI)
      if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
      run: |
        helm package charts/neo4j-operator \
          --version "${{ steps.release-tag.outputs.clean_tag }}" \
          --app-version "${{ steps.release-tag.outputs.clean_tag }}"
        helm push "neo4j-operator-${{ steps.release-tag.outputs.clean_tag }}.tgz" \
          "oci://${{ env.CHART_REGISTRY }}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go environment
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Generate release tarball and manifests
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
        fi

        # Clean tag name for directory
        CLEAN_TAG=${TAG_NAME#v}

        # Generate manifests
        make manifests

        # Generate OperatorHub bundle/CSV for this release
        make bundle \
          VERSION="${CLEAN_TAG}" \
          CHANNELS=alpha \
          DEFAULT_CHANNEL=alpha \
          IMG="${REGISTRY}/${IMAGE_NAME}:${TAG_NAME}"

        # Create release artifacts directory
        mkdir -p release-artifacts

        # Copy CRD manifests
        cp config/crd/bases/*.yaml release-artifacts/

        # Copy OperatorHub bundle/CSV
        cp bundle/manifests/*.yaml release-artifacts/
        cp bundle/metadata/annotations.yaml release-artifacts/
        tar -czf "release-artifacts/operatorhub-bundle-${CLEAN_TAG}.tar.gz" bundle/

        # Create source tarball
        git archive --format=tar.gz --prefix=neo4j-kubernetes-operator-${CLEAN_TAG}/ ${TAG_NAME} > release-artifacts/neo4j-kubernetes-operator-${CLEAN_TAG}.tar.gz

        # Create examples archive
        tar -czf release-artifacts/examples-${CLEAN_TAG}.tar.gz examples/

        # Bundle manifests for easy deployment
        cat config/crd/bases/*.yaml > release-artifacts/neo4j-kubernetes-operator.yaml

        # Create operator deployment manifest (includes CRDs + operator)
        kubectl kustomize config/default > release-artifacts/neo4j-kubernetes-operator-complete.yaml

    - name: Generate release notes
      id: release-notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
        fi
        MCP_TAG="${{ needs.build-and-push.outputs.mcp_tag }}"

        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

        cat > release-notes.md << EOF
        # Neo4j Kubernetes Operator $TAG_NAME

        ## 🚀 What's New

        This release includes the latest updates to the Neo4j Kubernetes Operator.

        ## 🔧 Installation

        ### Quick Install (Complete Operator)
        \`\`\`bash
        kubectl apply -f https://github.com/priyolahiri/neo4j-kubernetes-operator/releases/download/$TAG_NAME/neo4j-kubernetes-operator-complete.yaml
        \`\`\`

        ### CRDs Only
        \`\`\`bash
        kubectl apply -f https://github.com/priyolahiri/neo4j-kubernetes-operator/releases/download/$TAG_NAME/neo4j-kubernetes-operator.yaml
        \`\`\`

        ## 📦 Release Assets

        - **Source Code**: \`neo4j-kubernetes-operator-\${TAG_NAME#v}.tar.gz\` - Complete source code tarball
        - **Examples**: \`examples-\${TAG_NAME#v}.tar.gz\` - Example configurations
        - **Operator Manifests**: \`neo4j-kubernetes-operator-complete.yaml\` - Complete operator installation
        - **CRD Manifests**: \`neo4j-kubernetes-operator.yaml\` - Custom Resource Definitions only

        ## ⎈ Helm (OCI)

        \`\`\`bash
        helm install neo4j-operator oci://ghcr.io/priyolahiri/charts/neo4j-operator \\
          --version ${TAG_NAME#v} \\
          --namespace neo4j-operator-system \\
          --create-namespace
        \`\`\`

        ## 📋 Requirements

        - Kubernetes 1.28+
        - Neo4j Enterprise 5.26+ or CalVer 2025.01.0+
        - cert-manager (for TLS)

        ## 🔗 Container Images

        - \`ghcr.io/priyolahiri/neo4j-kubernetes-operator:$TAG_NAME\`
        - \`ghcr.io/priyolahiri/neo4j-kubernetes-operator:latest\`
        - \`ghcr.io/priyolahiri/neo4j-kubernetes-operator-mcp:$MCP_TAG\`

        ## 📚 Documentation

        - [Getting Started Guide](./docs/README.md)
        - [API Reference](./docs/api_reference/)
        - [User Guide](./docs/user_guide/)

        ## 🐛 Bug Reports

        Please report issues at [GitHub Issues](https://github.com/priyolahiri/neo4j-kubernetes-operator/issues)
        EOF

        curl -sSf \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
          -d "{\"tag_name\":\"${TAG_NAME}\"}" > auto-notes.json

        python - <<'PY'
        import json

        with open("auto-notes.json", "r") as handle:
            body = json.load(handle).get("body", "").strip()

        if body:
            with open("release-notes.md", "a") as handle:
                handle.write("\n\n## Changelog\n\n")
                handle.write(body)
        PY


    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release-notes.outputs.TAG_NAME }}
        name: Neo4j Kubernetes Operator ${{ steps.release-notes.outputs.TAG_NAME }}
        body_path: release-notes.md
        files: |
          release-artifacts/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
