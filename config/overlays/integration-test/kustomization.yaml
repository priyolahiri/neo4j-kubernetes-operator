apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Integration-test overlay — production mode, dedicated image tag.
# Deploys to neo4j-operator-system without --mode=dev so the operator runs
# identically to production. Used by `make test-integration` and ci.yml.

resources:
- ../../default

images:
- name: ghcr.io/neo4j-partners/neo4j-kubernetes-operator
  newName: neo4j-operator
  newTag: integration-test

# Same resource limits as the prod overlay so we exercise realistic conditions.
patches:
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  target:
    kind: Deployment
    name: controller-manager

# Relax property-sharding's 4Gi/1-core minimum so the sharded smoke test
# fits within GitHub-hosted runners (~5Gi usable). Production overlays
# do NOT set this — the floor exists to prevent silent OOMs in real
# workloads. CI is the only place this env var should appear.
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: NEO4J_SHARDING_RELAX_MEMORY_MIN
        value: "true"
  target:
    kind: Deployment
    name: controller-manager

namespace: neo4j-operator-system
