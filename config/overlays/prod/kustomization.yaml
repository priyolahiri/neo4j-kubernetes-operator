apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base configuration
resources:
- ../../default

# Production-specific image (using local build)
images:
# Match the BASE's already-transformed image name — config/manager renames
# `controller` -> ghcr.io/... before overlays run, so matching `controller`
# here never applied (the overlay image was silently ignored).
- name: ghcr.io/priyolahiri/neo4j-kubernetes-operator
  newName: neo4j-operator
  newTag: latest

# Production-specific patches
patches:
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  target:
    kind: Deployment
    name: controller-manager
namespace: neo4j-operator-system
