apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base configuration
resources:
- ../../default

# Production-specific image (using GitHub Container Registry)
images:
# Match the BASE's already-transformed image name — config/manager renames
# `controller` -> ghcr.io/... before overlays run, so matching `controller`
# here never applied (the overlay image was silently ignored).
- name: ghcr.io/neo4j-partners/neo4j-kubernetes-operator
  newName: ghcr.io/neo4j-partners/neo4j-kubernetes-operator
  newTag: latest

# Production-specific patches
patches:
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 128Mi
  target:
    kind: Deployment
    name: controller-manager
namespace: neo4j-operator-system
