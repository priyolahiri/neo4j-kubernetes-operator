# Read-only application user bound to the built-in `reader` role.
#
# Apply order is irrelevant: the operator converges. If you apply the
# Neo4jUser before the Secret, the user enters Pending until the Secret
# lands; if you apply it before the cluster is Ready, it enters Pending
# until the cluster transitions.

# ── App-user password Secret (create this BEFORE you apply this manifest) ──────
# Not defined inline: `kubectl apply -f` would re-apply it every run and OVERWRITE
# the password with the placeholder. Create it out-of-band, in the same namespace
# as the Neo4jUser below:
#
#   kubectl create namespace prod   # if it doesn't exist yet
#   kubectl create secret generic app-reader-creds --namespace prod \
#     --from-literal=password='<app-reader-password>'
#
# Referenced via the Neo4jUser's spec.passwordSecretRef.name: app-reader-creds
---
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jUser
metadata:
  name: app-reader
  namespace: prod
spec:
  clusterRef: prod-cluster
  username: app_reader
  passwordSecretRef:
    name: app-reader-creds
  roles:
    - reader
