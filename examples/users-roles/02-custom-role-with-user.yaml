# A custom role with explicit privileges, plus a user bound to it.
#
# This is the canonical pattern: model "what can be done" as a Neo4jRole
# and "who can do it" as a Neo4jUser referencing the role by name. The
# user controller watches Neo4jRole, so the user reconciles automatically
# when the role lands.
#
# The role's privileges target the `analytics` database, so the example
# creates it too — Neo4j rejects graph privileges (e.g. DENY WRITE ON
# GRAPH) against a database that doesn't exist yet.

apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jDatabase
metadata:
  name: analytics
  namespace: prod
spec:
  clusterRef: prod-cluster
  name: analytics
  ifNotExists: true
  wait: true

---
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jRole
metadata:
  name: analytics-reader
  namespace: prod
spec:
  clusterRef: prod-cluster
  # Neo4j role names may contain only letters, digits and underscores —
  # hyphens (the Kubernetes naming convention used by metadata.name above)
  # are NOT valid, so the Neo4j role name (spec.name) is the underscore form.
  # Users may reference EITHER this spec.name OR the CR's metadata.name
  # (analytics-reader) in their spec.roles: the operator resolves a
  # same-namespace, same-clusterRef Neo4jRole CR name to its spec.name (#260).
  name: analytics_reader
  # Each privilege MUST end with `TO <spec.name>` so the controller can
  # derive the matching REVOKE if the privilege is later removed.
  privileges:
    - "GRANT ACCESS ON DATABASE analytics TO analytics_reader"
    - "GRANT MATCH {*} ON GRAPH analytics NODES * TO analytics_reader"
    - "DENY WRITE ON GRAPH analytics TO analytics_reader"
---
# ── App-user password Secret (create this BEFORE you apply this manifest) ──────
# Not defined inline: `kubectl apply -f` would re-apply it every run and OVERWRITE
# the password with the placeholder. Create it out-of-band, in the same namespace
# as the Neo4jUser below:
#
#   kubectl create namespace prod   # if it doesn't exist yet
#   kubectl create secret generic analytics-reader-creds --namespace prod \
#     --from-literal=password='<analytics-reader-password>'
#
# Referenced via the Neo4jUser's spec.passwordSecretRef.name: analytics-reader-creds
---
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jUser
metadata:
  name: analytics-reader
  namespace: prod
spec:
  clusterRef: prod-cluster
  username: analytics_reader
  passwordSecretRef:
    name: analytics-reader-creds
  roles:
    # Reference the Neo4jRole by its CR metadata.name — the operator resolves
    # it to the role's spec.name (analytics_reader) automatically (#260). The
    # underscore form (analytics_reader) also works.
    - analytics-reader
