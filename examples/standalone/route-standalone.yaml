apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jEnterpriseStandalone
metadata:
  name: route-standalone
spec:
  image:
    repo: neo4j
    tag: "5.26.0-enterprise"
  storage:
    # className omitted -> inherits the cluster's default StorageClass (portable).
    # To pin one, set a class that EXISTS on your cluster (AKS: managed-csi, EKS: gp3, GKE: standard-rwo, Kind: standard);
    # the operator rejects a non-existent class instead of leaving the pod Pending.
    # className: managed-csi
    size: 10Gi
  auth:
    adminSecret: neo4j-admin-secret
  service:
    type: ClusterIP
    route:
      enabled: true
      host: route-standalone.apps.example.com
      tls:
        termination: edge   # edge | reencrypt | passthrough
  securityContext:
    podSecurityContext:
      runAsNonRoot: true
