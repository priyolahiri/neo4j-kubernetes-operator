# ============================================================
# Scheduled Daily Backup to S3 — explicit credentials
#
# Create the AWS credentials secret first:
#   kubectl create secret generic aws-backup-credentials \
#     --from-literal=AWS_ACCESS_KEY_ID=<your-access-key-id> \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<your-secret-access-key>
# ============================================================
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jBackup
metadata:
  name: daily-backup
  labels:
    environment: production
    backup-type: scheduled
    schedule: daily
spec:
  target:
    kind: Cluster
    name: my-neo4j  # kind=Cluster: the Neo4jEnterpriseCluster OR Neo4jEnterpriseStandalone instance name (clusterRef unused; backs up all databases)
  # schedule is a flat cron string — no nesting
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  storage:
    type: s3
    bucket: production-neo4j-backups
    path: daily-backups
    cloud:
      provider: aws
      credentialsSecretRef: aws-backup-credentials  # Secret with AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
  retention:
    maxAge: "7d"
    maxCount: 7
  options:
    compress: true
    backupType: AUTO   # FULL on first run, DIFF afterwards
    tempPath: /tmp/neo4j-backup-temp
  # Set suspend: true to temporarily pause this scheduled backup
  suspend: false

# ── AWS backup credentials Secret (create this BEFORE you apply this manifest) ─
# Not defined inline: `kubectl apply -f` would re-apply it every run and OVERWRITE
# the values with the placeholders, clobbering real credentials. Create it
# out-of-band:
#
#   kubectl create secret generic aws-backup-credentials \
#     --from-literal=AWS_ACCESS_KEY_ID='<your-access-key-id>' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='<your-secret-access-key>'
#
# Referenced via spec.storage.cloud.credentialsSecretRef: aws-backup-credentials

---
# ============================================================
# Weekly Backup with longer retention — IRSA workload identity
# (no static credentials required)
# ============================================================
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jBackup
metadata:
  name: weekly-backup
  labels:
    environment: production
    backup-type: scheduled
    schedule: weekly
spec:
  target:
    kind: Cluster
    name: single-node-cluster
  schedule: "0 1 * * 0"  # Weekly on Sunday at 1 AM UTC
  storage:
    type: s3
    bucket: production-neo4j-backups
    path: weekly-backups
    cloud:
      provider: aws
      identity:
        provider: aws
        autoCreate:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/neo4j-backup-role
  retention:
    maxAge: "90d"
    maxCount: 12
  options:
    compress: true
    backupType: FULL
    tempPath: /tmp/neo4j-backup-temp
  suspend: false
