# Complete Point-in-Time Recovery Setup
# This file demonstrates a complete PITR environment setup including:
# - Base backup configuration (Neo4jBackup)
# - Transaction log storage setup (conceptual ConfigMap)
# - A PITR restore (Neo4jRestore) against a STANDALONE target
#
# NOTE on PITR target type:
#   Neo4jRestore `source.type: pitr` uses `neo4j-admin database restore
#   --restore-until` (a Job) and applies ONLY to a Neo4jEnterpriseStandalone.
#   For a CLUSTER, do point-in-time recovery by creating a Neo4jDatabase with
#   spec.seedConfig.restoreUntil instead — the operator rejects source.type=pitr
#   against a cluster target. See examples/databases/database-from-s3-seed.yaml.

---
# Base backup for PITR
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jBackup
metadata:
  name: pitr-base-backup
  labels:
    environment: production
    backup-type: pitr-base
    pitr: "true"
spec:
  instanceRef: production-cluster
  allDatabases: true
  schedule: "0 0 * * *"  # Daily base backup at midnight
  storage:
    type: s3
    bucket: pitr-base-backups
    path: production/base
    cloud:
      provider: aws
      credentialsSecretRef: pitr-aws-credentials
  # NOTE: for cloud storage (s3) the operator does NOT prune objects — these
  # retention settings are advisory; configure S3 lifecycle rules instead.
  retention:
    maxAge: "30d"
    maxCount: 30
    deletePolicy: Delete
  options:
    compress: true
    # validate runs `neo4j-admin backup validate` after the backup and records
    # the result on status.history[].validation. (options.verify is a RESERVED
    # no-op — don't use it.)
    validate: true
    # Include users/roles metadata in the backup (all|none|users|roles).
    includeMetadata: all
    # Multi-threaded transaction application during backup.
    parallelRecovery: true

---
# Transaction log backup (conceptual - would be handled by Neo4j configuration).
# These keys are illustrative of the intended log-archival setup, not operator-
# managed configuration.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pitr-transaction-log-config
data:
  neo4j.conf: |
    # Transaction log configuration for PITR
    dbms.tx_log.rotation.retention_policy=7d
    dbms.tx_log.rotation.size=250M

# ── PITR AWS credentials Secret (create this BEFORE you apply this manifest) ───
# Not defined inline: `kubectl apply -f` would re-apply it every run and OVERWRITE
# the values with the placeholders, clobbering real credentials. Create it
# out-of-band:
#
#   kubectl create secret generic pitr-aws-credentials \
#     --from-literal=AWS_ACCESS_KEY_ID='<your-access-key-id>' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='<your-secret-access-key>' \
#     --from-literal=AWS_REGION='us-east-1'   # required: read as a non-optional env var
#
# Referenced via the Neo4jBackup's spec.storage.cloud.credentialsSecretRef.

---
# Example PITR restore configuration (STANDALONE target — see note at top).
apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jRestore
metadata:
  name: pitr-example-restore
  labels:
    environment: disaster-recovery
    restore-type: pitr-example
spec:
  # Must reference a Neo4jEnterpriseStandalone (PITR is standalone-only).
  instanceRef: recovery-standalone
  database: production-db
  source:
    type: pitr
    pointInTime: "2025-01-04T12:00:00Z"  # Adjust to desired recovery point
    pitr:
      baseBackup:
        type: backup
        backupRef: pitr-base-backup
      logStorage:
        type: s3
        bucket: transaction-logs
        path: production/logs
        cloud:
          provider: aws
  options:
    replaceExisting: true
    # Hooks run only on standalone targets (this example). preRestore Cypher
    # hooks run BEFORE the instance is stopped; postRestore hooks run AFTER
    # the restored database is registered/started.
    preRestore:
      cypherStatements:
        - "CALL db.checkpoint()"
      job:
        template:
          container:
            image: alpine:latest
            command: ["/bin/sh"]
            args:
              - "-c"
              - |
                echo "=== PITR Pre-Restore Preparation ==="
                echo "Recovery point: 2025-01-04T12:00:00Z"
                echo "Validating recovery environment..."
                echo "Pre-restore preparation completed"
        timeout: "10m"
    postRestore:
      cypherStatements:
        - "CALL db.awaitIndexes(600)"
        - "CALL dbms.security.clearAuthCache()"
        - "CREATE CONSTRAINT pitr_recovery_log IF NOT EXISTS FOR (n:RecoveryLog) REQUIRE n.id IS UNIQUE"
        - |
          MERGE (log:RecoveryLog {id: randomUUID()})
          SET log.timestamp = datetime(),
              log.recovery_type = 'PITR',
              log.recovery_point = '2025-01-04T12:00:00Z',
              log.source_backup = 'pitr-base-backup'
      job:
        template:
          container:
            image: neo4j:5.26.0-enterprise
            command: ["/bin/sh"]
            args:
              - "-c"
              - |
                echo "=== PITR Post-Restore Validation ==="
                # -a points cypher-shell at the standalone's service — the hook
                # Job runs in its own pod, so omitting it dials localhost.
                cypher-shell -a neo4j://recovery-standalone-client:7687 \
                  -u neo4j -p "$NEO4J_PASSWORD" -d production-db \
                  "CALL db.ping() YIELD success RETURN success"
                cypher-shell -a neo4j://recovery-standalone-client:7687 \
                  -u neo4j -p "$NEO4J_PASSWORD" -d production-db \
                  "MATCH (n) RETURN labels(n)[0] as label, count(n) as count ORDER BY label"
                echo "PITR validation completed successfully"
            env:
              - name: NEO4J_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: recovery-standalone-admin-secret
                    key: password
        timeout: "20m"
  force: true
  stopCluster: true
  timeout: "4h"

# ── Recovery standalone admin credentials Secret (create BEFORE applying) ──────
# Not defined inline: `kubectl apply -f` would re-apply it every run and OVERWRITE
# the password with the placeholder, clobbering a real credential. Create it
# out-of-band (this is also the admin Secret of the recovery-standalone target):
#
#   kubectl create secret generic recovery-standalone-admin-secret \
#     --from-literal=username='neo4j' \
#     --from-literal=password='<your-secure-password>'
#
# Referenced via the postRestore job's NEO4J_PASSWORD secretKeyRef.

# ── No extra ServiceAccount or RBAC is needed ──────────────────────────────────
# The operator runs backup Jobs as the operator-managed `neo4j-backup-sa` and
# restore Jobs as `neo4j-restore-sa` (both auto-created in the CR's namespace;
# they need no Kubernetes API access, so no Role/RoleBinding is created).
# To use IAM roles (IRSA) instead of the static-credentials Secret above,
# bind the role on the operator-managed SA via the Neo4jBackup spec:
#
#   spec:
#     storage:
#       cloud:
#         provider: aws
#         identity:
#           provider: aws
#           autoCreate:
#             annotations:
#               eks.amazonaws.com/role-arn: arn:aws:iam::YOUR-ACCOUNT:role/neo4j-pitr-role
