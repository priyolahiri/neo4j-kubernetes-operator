{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "neo4j-operator.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.metrics.serviceMonitor.namespace }}
  labels:
    {{- include "neo4j-operator.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: {{ .Values.metrics.serviceMonitor.interval }}
    scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
    honorLabels: {{ .Values.metrics.serviceMonitor.honorLabels }}
    {{- if .Values.metrics.secure }}
    # Secure metrics: controller-runtime serves /metrics over HTTPS with a
    # self-signed cert by default, requiring a Bearer token whose SA has
    # the `metrics-reader` ClusterRole bound. insecureSkipVerify=true
    # accepts the self-signed cert; production setups should swap this
    # for a cert-manager-issued CA bundle.
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
    {{- with .Values.metrics.serviceMonitor.bearerTokenSecret.name }}
    bearerTokenSecret:
      name: {{ . }}
      key: {{ $.Values.metrics.serviceMonitor.bearerTokenSecret.key | default "token" }}
    {{- end }}
    {{- end }}
    {{- with .Values.metrics.serviceMonitor.relabelings }}
    relabelings:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
    metricRelabelings:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "neo4j-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: metrics
{{- end }}
